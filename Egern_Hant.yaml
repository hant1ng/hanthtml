policy_groups:
- select:
    name: PROXY
    policies:
    - 自动选择
    - 香港节点
    - 台湾节点
    - 日本节点
    - 狮城节点
    - 美国节点
    - DIRECT
    flatten: false
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/02ProxySoftLogo/Egern.png
    hidden: false
- select:
    name: NoAuto
    policies:
    - 自动选择
    - 香港节点
    - 台湾节点
    - 日本节点
    - 狮城节点
    - 美国节点
    - DIRECT
    flatten: false
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/02ProxySoftLogo/Egern.png
    hidden: false
- select:
    name: Ai
    policies:
    - 美国节点
    - 日本节点
    - 狮城节点
    - PROXY
    flatten: false
    hidden: false
- select:
    name: Google服务
    policies:
    - 美国节点
    - 日本节点
    - 香港节点
    - PROXY
    flatten: false
    hidden: false
- select:
    name: Telegram
    policies:
    - 狮城节点
    - 香港节点
    - 日本节点
    - PROXY
    flatten: false
    hidden: false
- external:
    name: 机场订阅
    type: select
    urls:
    - 机场链接
    update_interval: 86400
    hidden: true
- fallback:
    name: 自动选择
    policies:
    - 机场订阅
    flatten: true
    hidden: true
- fallback:
    name: 香港节点
    policies:
    - 机场订阅
    flatten: true
    filter: 🇭🇰|香港|Hong Kong|HK|HKG
    hidden: true
- fallback:
    name: 台湾节点
    policies:
    - 机场订阅
    flatten: true
    filter: 🇹🇼|台湾|Taiwan|TW|Tai
    hidden: true
- fallback:
    name: 日本节点
    policies:
    - 机场订阅
    flatten: true
    filter: 🇯🇵|日本|Japan|JP
    hidden: true
- fallback:
    name: 狮城节点
    policies:
    - 机场订阅
    flatten: true
    filter: 🇸🇬|新加坡|Singapore|SG
    hidden: true
- fallback:
    name: 美国节点
    policies:
    - 机场订阅
    flatten: true
    filter: 🇺🇸|美国|United States|USA|US|States
    hidden: true
