[General]
# --- GENERAL / 通用设置 ---
# Enhanced Wi-Fi Assist / 增强 Wi-Fi 助手
wifi-assist = true
# Hybrid Network / 混合网络
all-hybrid = false
# Gaming Optimization / 游戏优化
udp-priority = false
# Latency Benchmark / 延迟基准测试
internet-test-url = http://connectivitycheck.gstatic.com/generate_204
proxy-test-url = http://latency-test.skk.moe/endpoint
test-timeout = 3
# GeoIP Database / GeoIP 数据库
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
# IPv6 Support / IPv6 支持
ipv6 = false
ipv6-vif = auto
# --- Wi-Fi ACCESS / Wi-Fi 访问 ---
allow-wifi-access = true
wifi-access-http-port = 6152
wifi-access-socks5-port = 6153
http-listen = 0.0.0.0
socks5-listen = 0.0.0.0
allow-hotspot-access = true
# udp 走代理
#udp-policy-not-supported-behaviour = REJECT
# --- REMOTE CONTROLLER / 远程控制器 ---
external-controller-access = 16521156@0.0.0.0:6160
http-api = clashconnectrules@0.0.0.0:6166
http-api-tls = true
http-api-web-dashboard = true
# --- COMPATIBILITY / 兼容性 ---
compatibility-mode = 0
# --- NETWORK / 网络 ---
skip-proxy = localhost, *.local, captive.apple.com, guzzoni.apple.com, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
exclude-simple-hostnames = true
read-etc-hosts = true
# --- DNS / 域名系统 ---
use-local-host-item-for-proxy = true
encrypted-dns-follow-outbound-mode = false
include-all-networks = false
include-local-networks = false
dns-server = 223.5.5.5, 223.6.6.6, 119.29.29.29
encrypted-dns-server = https://doh.pub/dns-query, https://dns.alidns.com/dns-query
loglevel = notify
# --- ADVANCED / 高级设置 ---
show-error-page-for-reject = true
force-http-engine-hosts = *.ott.cibntv.net, 123.59.31.1, 119.18.193.135, 122.14.246.33, 175.102.178.52, 116.253.24.*, 175.6.26.*, 220.169.153.*
always-real-ip = link-ip.nextdns.io, *.msftconnecttest.com, *.msftncsi.com, *.srv.nintendo.net, *.stun.playstation.net, xbox.*.microsoft.com, *.xboxlive.com, *.logon.battlenet.com.cn, *.logon.battle.net, stun.l.google.com
hijack-dns = 8.8.8.8:53, 8.8.4.4:53
proxy-restricted-to-lan = false

[Proxy]


[Proxy Group]
# 手动选择组：优先大陆直连或自动选择，不自动测速（手动切换用）
NoAuto = select, Mainland, Automatic, "Hong Kong", no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/lightning.png

# 自动选择组：从各地区节点中按延迟自动选优，900s 刷新一次
Automatic = select, "Hong Kong", Taiwan, Japan, Singapore, "United States", "United Kingdom", Korea, DIRECT, 日本住宅, url=http://cp.cloudflare.com/generate_204, interval=900, tolerance=50, timeout=3, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/lightning(5).png


# 全部节点：从 ikun 订阅源中筛选有效节点（排除流量/到期等无效节点）
AllServer = select, update-interval=0, no-alert=0, hidden=0, include-all-proxies=0, policy-regex-filter=^((?!Remain|Expired|官网|客户端|免费|过期|如需|套餐|去除|剩余|距离|Reset|重置|流量).)+$, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/02ProxySoftLogo/Surge(15).png, policy-path=https://你得订阅地址

# 代理总开关：手动在各地区节点间切换
Proxy = select, Automatic, "Hong Kong", Taiwan, Singapore, Japan, "United States", "United Kingdom", no-alert=0, hidden=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/jichang.png

# Apple 服务策略：可选大陆直连、港区或美区
Apple = select, Mainland, "Hong Kong", "United States", DIRECT, hidden=1, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/apple.png

# AI 服务（ChatGPT/Claude 等）：优先使用美国或日本节点，或住宅 IP
AI = select, Automatic, "United States", Japan, 日本住宅, Singapore, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/claude.png

# Microsoft 服务：可选大陆直连或海外节点
Microsoft = select, Mainland, "Hong Kong", Singapore, "United States", hidden=1, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/microsoft(1).png

# OneDrive：可选大陆直连或海外节点
OneDrive = select, Mainland, "Hong Kong", Singapore, "United States", hidden=1, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/OneDrive(1).png

# Telegram：优先新加坡/美国节点
Telegram = select, Automatic, Singapore, "United States", "Hong Kong", Taiwan, Japan, Other, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/telegram(blue1).png

# --- 社交通讯 ---

# 微信：可走大陆直连，保障稳定性（隐藏在主界面）
WeChat = select, Mainland, "Hong Kong", Singapore, "United States", hidden=1, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/wechat(1).png

# X（原 Twitter）：走海外节点
X = select, Automatic, "Hong Kong", Taiwan, Singapore, Japan, "United States", no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/twitter(2).png

