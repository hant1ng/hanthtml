[URL Rewrite]
# 将 Google 中国域名（g.cn / google.cn）重定向到 google.com
^https?:\/\/(www\.)?(g|google)\.cn https://www.google.com 302

# 将 Google 地图中国域名重定向到国际版
^https?:\/\/(ditu|maps)\.google\.cn https://maps.google.com 302

# 电商网站强制 HTTPS 重定向（淘宝/京东/小米/网易/苏宁/一号店）
^https?:\/\/(www\.)?taobao\.com\/ https://taobao.com/ 302
^https?:\/\/(www\.)?jd\.com\/ https://www.jd.com/ 302
^https?:\/\/(www\.)?mi\.com\/ https://www.mi.com/ 302
^https?:\/\/you\.163\.com\/ https://you.163.com/ 302
^https?:\/\/(www\.)?suning\.com\/ https://suning.com/ 302
^https?:\/\/(www\.)?yhd\.com\/ https://yhd.com/ 302

# 拒绝 ABEMA 的 IP 地区检测请求（配合 MITM 实现解锁）
^https?:\/\/api\.abema\.io\/v\d\/ip\/check - reject

[Header Rewrite]
# 修改 GitHub 请求的 Accept-Language 为英文，解决触发速率限制（429）的问题
http-request ^https:\/\/github\.com\/ header-replace Accept-Language en-us
http-request ^https:\/\/(raw|gist)\.githubusercontent\.com\/ header-replace Accept-Language en-us

[MITM]
# 跳过服务器证书验证（自签名证书环境使用）
skip-server-cert-verify = true

# 启用 TCP 连接（MITM 对 TCP 层生效）
tcp-connection = true

# 启用 HTTP/2 支持
h2 = true

# MITM 主机名列表：对以下域名进行中间人解密（-前缀表示排除）
hostname = www.google.cn, api.abema.io, *.zhihu.com, sub.store, -*.twimg.com

# MITM CA 证书密码（用于解密 MITM 流量）
ca-passphrase = 7C5E85CD

# MITM CA 证书（P12 格式，Base64 编码）
ca-p12 = 
