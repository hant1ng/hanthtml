TikTok = select, Taiwan, Singapore, Japan, "United States", no-alert=0, hidden=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/tiktok.png

# YouTube：走自动选优节点
YouTube = select, Automatic, "Hong Kong", Taiwan, Singapore, Japan, "United States", no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/youtube(4).png

# Spotify：优先日本节点（版权区域选择）
Spotify = select, Automatic, Japan, Taiwan, Singapore, "United States", no-alert=0, hidden=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png

# --- 测速 ---

# Speedtest：可选大陆直连或海外节点测速（隐藏）
Speedtest = select, Mainland, Automatic, AllServer, no-alert=0, hidden=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/speedtest(2).png

# 大陆直连组：所有中国大陆流量走 DIRECT
Mainland = select, DIRECT, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/taiwan.png

# 住宅 IP 组：在日本住宅与临时住宅之间手动切换（用于需要洁净住宅 IP 的场景）
住宅IP = select, 日本住宅, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Back.png

# 香港地区节点组：从 AllServer 中筛选香港节点，使用 smart 模式自动选优（隐藏）
Hong Kong = smart, update-interval=0, policy-regex-filter=港|🇭🇰|香港|HK|Hong, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=AllServer, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Hongkong(2).png, url=http://cp.cloudflare.com/generate_204, interval=900, tolerance=50, timeout=3


# 台湾地区节点组：从 AllServer 中筛选台湾节点，smart 模式自动选优（隐藏）
Taiwan = smart, update-interval=0, policy-regex-filter=台|🇹🇼|台湾|TW|Tai, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=AllServer, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/taiwan(2).png, url=http://cp.cloudflare.com/generate_204, interval=900, tolerance=50, timeout=3

# 日本地区节点组：从 AllServer 中筛选日本节点，smart 模式自动选优（隐藏）
Japan = smart, update-interval=0, policy-regex-filter=日|🇯🇵|日本|JP|Japan, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=AllServer, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Japan(1).png, url=http://cp.cloudflare.com/generate_204, interval=900, tolerance=50, timeout=3

# 新加坡地区节点组：从 AllServer 中筛选新加坡节点，smart 模式自动选优（隐藏）
Singapore = smart, update-interval=0, policy-regex-filter=坡|🇸🇬|新加坡|狮城|SG|Singapore, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=AllServer, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/singapore(2).png, url=http://cp.cloudflare.com/generate_204, interval=900, tolerance=50, timeout=3

# 美国地区节点组：从 AllServer 中筛选美国节点，smart 模式自动选优（隐藏）
United States = smart, update-interval=0, policy-regex-filter=美|🇺🇸|美国|US|States|American, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=AllServer, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/US(1).png, url=http://cp.cloudflare.com/generate_204, interval=900, tolerance=50, timeout=3

# 英国地区节点组：从 AllServer 中筛选英国节点，smart 模式自动选优（隐藏）
United Kingdom = smart, update-interval=0, policy-regex-filter=🇬🇧|英国|英|英格兰|UK|United Kingdom, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=AllServer, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/UnitedKingdom.png, url=http://cp.cloudflare.com/generate_204, interval=900, tolerance=50, timeout=3

# 韩国地区节点组：从 AllServer 中筛选韩国节点，smart 模式自动选优（隐藏）
Korea = smart, update-interval=0, policy-regex-filter=韩|韩国|Korea|KR|🇰🇷, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=AllServer, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Korea(1).png, url=http://cp.cloudflare.com/generate_204, interval=900, tolerance=50, timeout=3

# 其他地区节点组：排除所有主要地区及无效节点后的剩余节点，smart 模式自动选优（隐藏）
Other = smart, update-interval=0, policy-regex-filter=^((?!港|🇭🇰|香港|HK|Hong|台|🇹🇼|台湾|TW|Tai|日|🇯🇵|日本|JP|Japan|坡|🇸🇬|新加坡|狮城|SG|Singapore|美|🇺🇸|美国|US|States|American|🇬🇧|英国|英|英格兰|UK|United Kingdom|韩|韩国|Korea|KR|🇰🇷|Remain|Expired|官网|如需|套餐|去除|剩余|距离|Reset|重置|流量).)+$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=AllServer, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/lige.png, url=http://cp.cloudflare.com/generate_204, interval=1800, tolerance=50, timeout=3

