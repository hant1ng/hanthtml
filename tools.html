<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tools · Hant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'HarmonyOS Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f3f3f3;
      color: #191919;
      padding: 0 0 100px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #eaeaea;
      padding: 10px 20px;
    }
    .nav-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #eaeaea;
      background: transparent;
      color: #888;
      transition: all 0.15s;
    }
    .nav-tab:hover { background: #f3f3f3; color: #191919; }
    .nav-tab.active { background: #191919; color: #fff; border-color: transparent; }

    /* 悬浮搜索胶囊 */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 24px;
      z-index: 200;
      display: flex;
      align-items: center;
      height: 42px;
      border-radius: 21px;
      background: #191919;
      border: none;
      cursor: pointer;
      overflow: hidden;
      width: 42px;
      transition: width 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .fab:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.22); }
    .fab.open { width: 220px; }
    .fab-icon {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
    }
    .fab input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 13px;
      padding: 0 14px 0 0;
      width: 0;
      opacity: 0;
      transition: opacity 0.2s 0.1s;
      caret-color: #fff;
    }
    .fab.open input { width: auto; opacity: 1; }
    .fab input::placeholder { color: rgba(255,255,255,0.4); }

    .page { padding: 20px 20px 0; max-width: 960px; margin: 0 auto; }
    .section { margin-bottom: 2rem; scroll-margin-top: 60px; }
    .section-title {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 10px;
      text-decoration: none;
      color: #191919;
      transition: border-color 0.15s, transform 0.15s;
    }
    .card:hover { border-color: #ccc; transform: translateY(-2px); }
    .card.hidden { display: none; }
    .card-name { font-size: 13px; font-weight: 500; }
    .card-desc { font-size: 11px; color: #b2b2b2; line-height: 1.4; }
    .dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 6px; }
    .section.empty { display: none; }
    .no-result {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 40px 0;
      display: none;
    }
    mark { background: #ffe066; color: inherit; border-radius: 2px; padding: 0 1px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="nav-tabs" id="nav-tabs"></div>
</div>

<div class="page" id="app"></div>
<div class="no-result" id="no-result">没有找到匹配的书签</div>

<!-- 悬浮搜索胶囊 -->
<div class="fab" id="fab">
  <div class="fab-icon" id="fab-icon">⌕</div>
  <input type="text" id="search" placeholder="搜索书签…" autocomplete="off" />
</div>

<script>
// ============================================================
//  ✏️  在这里管理所有书签
// ============================================================
const BOOKMARKS = [
  {
    category: '远程控制', color: '#7F77DD',
    items: [
      { name: 'AnyDesk',   url: 'https://anydesk.com',       desc: '远程控制与设备管理' },
      { name: '向日葵远程', url: 'https://sunlogin.oray.com', desc: '远程控制与设备管理' },
      { name: 'ToDesk',    url: 'https://www.todesk.com/',    desc: '远程控制与设备管理' },
    ]
  },
  {
    category: '即时通讯', color: '#378ADD',
    items: [
      { name: 'Telegram', url: 'https://telegram.org',     desc: '纸飞机' },
      { name: '微信',     url: 'https://weixin.qq.com',     desc: '国民聊天' },
      { name: 'QQ',       url: 'https://im.qq.com',         desc: '你的企鹅还在吗' },
      { name: 'LINE',     url: 'https://line.me',           desc: '跨国通讯' },
      { name: 'WhatsApp', url: 'https://www.whatsapp.com/', desc: '跨国通讯' },
    ]
  },
  {
    category: '浏览器 & 扩展', color: '#639922',
    items: [
      { name: '谷歌浏览器',      url: 'https://www.google.cn/chrome/',    desc: 'Chrome' },
      { name: 'Chrome 扩展下载', url: 'https://crxdl.com/',               desc: '先去广告' },
      { name: 'uBlock',          url: 'https://chromewebstore.google.com/detail/ublock/epcnnfbjfcgphgdmggkamkmgojdagdnn', desc: 'Chrome 去广告' },
      { name: 'SwitchyOmega 3',  url: 'https://chromewebstore.google.com/detail/proxy-switchyomega-3-zero/pfnededegaaopdmhkdmcofjmoldfiped', desc: '代理切换' },
    ]
  },
  {
    category: '梯子 & 代理', color: '#BA7517',
    items: [
      { name: '挂梯子',        url: 'https://guatizi.com/',                    desc: '梯子推荐' },
      { name: '快客 VPN',     url: 'https://www.quickq.io/',                  desc: '垃圾' },
      { name: '良心云',        url: 'https://良心云.com',                      desc: '真良心' },
      { name: '爱坤',          url: 'https://ikuuu.org',                       desc: '稳' },
      { name: 'Karing',        url: 'https://karing.app/',                     desc: '代理客户端' },
      { name: '美区 Apple ID', url: 'https://appark.ai/cn/us-appleid-shared', desc: '苹果共享账号' },
    ]
  },
  {
    category: '系统工具 & 装机', color: '#1D9E75',
    items: [
      { name: '山己子木',          url: 'https://msdn.sjjzm.com/',          desc: '系统镜像' },
      { name: '微 PE',             url: 'https://www.wepe.com.cn/',         desc: 'PE 工具箱' },
      { name: 'LetRecovery',       url: 'https://github.com/NORMAL-EX/LetRecovery', desc: '免费开源重装工具' },
      { name: 'KMS 服务',          url: 'https://kms.cangshui.net/',        desc: 'Windows 激活' },
      { name: 'Office Tools Plus', url: 'https://otp.landian.vip/zh-cn/',   desc: '一键部署 Office' },
      { name: 'Winhance',          url: 'https://winhance.net/',            desc: 'Windows 优化工具' },
      { name: 'WinRAR',            url: 'https://img.hant.me/file/1753526098238_WinRAR_5.61_x64_SC.exe', desc: '解压软件' },
    ]
  },
  {
    category: '软件下载', color: '#D4537E',
    items: [
      { name: '腾讯软件中心',   url: 'https://pc.qq.com/',               desc: '软件商店' },
      { name: 'APK Downloader', url: 'https://apkcombo.com/downloader/', desc: 'APK 下载器' },
    ]
  },
  {
    category: '开发 & 编程', color: '#534AB7',
    items: [
      { name: 'Cursor', url: 'https://cursor.com/', desc: 'AI 编程' },
    ]
  },
  {
    category: '账号 & 娱乐', color: '#888780',
    items: [
      { name: '账号鸭', url: 'https://zhanghaoya.com/',  desc: '海外账号买卖' },
      { name: '影牛',   url: 'https://moovie.c2v2.com/', desc: '免费在线电影' },
    ]
  },
];
// ============================================================

const app = document.getElementById('app');
const navTabs = document.getElementById('nav-tabs');
const searchInput = document.getElementById('search');
const noResult = document.getElementById('no-result');
const fab = document.getElementById('fab');
const fabIcon = document.getElementById('fab-icon');
const sectionEls = [];

BOOKMARKS.forEach(({ category, color, items }, si) => {
  const id = 'sec-' + si;

  const tab = document.createElement('button');
  tab.className = 'nav-tab';
  tab.textContent = category;
  tab.dataset.target = id;
  tab.addEventListener('click', () => {
    closeFab();
    setTimeout(() => {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 10);
  });
  navTabs.appendChild(tab);

  const section = document.createElement('div');
  section.className = 'section';
  section.id = id;

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = category;
  section.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'grid';

  items.forEach(({ name, url, desc }) => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = url;
    a.target = '_blank';
    a.dataset.name = name.toLowerCase();
    a.dataset.desc = desc.toLowerCase();
    a.dataset.nameOrig = name;
    a.dataset.descOrig = desc;
    a.innerHTML = `<div class="dot" style="background:${color}"></div><span class="card-name">${name}</span><span class="card-desc">${desc}</span>`;
    grid.appendChild(a);
  });

  section.appendChild(grid);
  app.appendChild(section);
  sectionEls.push(section);
});

function highlight(text, kw) {
  if (!kw) return text;
  const re = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function filterCards(kw) {
  const q = kw.trim().toLowerCase();
  let totalVisible = 0;
  sectionEls.forEach(section => {
    const cards = section.querySelectorAll('.card');
    let visible = 0;
    cards.forEach(card => {
      const match = !q || card.dataset.name.includes(q) || card.dataset.desc.includes(q);
      card.classList.toggle('hidden', !match);
      if (match) {
        visible++;
        card.querySelector('.card-name').innerHTML = highlight(card.dataset.nameOrig, q);
        card.querySelector('.card-desc').innerHTML = highlight(card.dataset.descOrig, q);
      }
    });
    section.classList.toggle('empty', visible === 0);
    totalVisible += visible;
  });
  noResult.style.display = totalVisible === 0 ? 'block' : 'none';
}

let isOpen = false;

function openFab() {
  isOpen = true;
  fab.classList.add('open');
  setTimeout(() => searchInput.focus(), 200);
}

function closeFab() {
  isOpen = false;
  fab.classList.remove('open');
  searchInput.value = '';
  filterCards('');
  searchInput.blur();
}

fabIcon.addEventListener('click', e => {
  e.stopPropagation();
  isOpen ? closeFab() : openFab();
});

searchInput.addEventListener('input', e => filterCards(e.target.value));
searchInput.addEventListener('keydown', e => { if (e.key === 'Escape') closeFab(); });
document.addEventListener('click', e => { if (isOpen && !fab.contains(e.target)) closeFab(); });

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      document.querySelectorAll('.nav-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.target === id);
      });
    }
  });
}, { rootMargin: '-30% 0px -60% 0px' });

sectionEls.forEach(s => observer.observe(s));
</script>
</body>
</html>
